name: Quality checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare dependencies
        run: |
          rm -f package-lock.json
          npm install --save-dev vite@8.0.16 --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Format files
        run: npm exec prettier -- --write .github/workflows/quality.yml package.json package-lock.json cookies/index.html privacy/index.html src/components/cookie-banner/cookie-banner.js src/main.js src/pages/legal-page.js src/services/analytics-service.js

      - name: Capture formatting output
        run: npm run format:check > format-output.txt 2>&1 || true

      - name: Upload formatting output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: format-output
          path: format-output.txt
          retention-days: 1
