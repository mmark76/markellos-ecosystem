name: Quality checks

on:
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: add-google-analytics

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Prepare dependencies
        run: |
          rm -f package-lock.json
          npm install --save-dev vite@8.0.16 --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Format GA4 files
        run: npm exec prettier -- --write .github/workflows/quality.yml package.json package-lock.json cookies/index.html privacy/index.html src/components/cookie-banner/cookie-banner.js src/main.js src/pages/legal-page.js src/services/analytics-service.js

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check formatted files
        run: npm exec prettier -- --check package.json package-lock.json cookies/index.html privacy/index.html src/components/cookie-banner/cookie-banner.js src/main.js src/pages/legal-page.js src/services/analytics-service.js

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Build production site
        run: npm run build

      - name: Commit prepared files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json cookies/index.html privacy/index.html src/components/cookie-banner/cookie-banner.js src/main.js src/pages/legal-page.js src/services/analytics-service.js
          if ! git diff --cached --quiet; then
            git commit -m "Upgrade Vite and format GA4 changes"
            git push origin HEAD:add-google-analytics
          fi
