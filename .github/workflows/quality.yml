name: Quality checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Diagnose dependency audit
        run: |
          npm init -y >/dev/null
          npm install --save-dev @eslint/js@9.39.4 eslint@9.39.4 prettier@3.8.4 vite@7.3.5 --no-fund
          npm audit --audit-level=high
