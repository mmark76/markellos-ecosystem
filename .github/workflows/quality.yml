name: Quality checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Prepare dependencies
        run: |
          rm -f package-lock.json
          npm install --save-dev vite@8.0.16 --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Format GA4 files
        run: npm exec prettier -- --write package.json package-lock.json cookies/index.html privacy/index.html src/components/cookie-banner/cookie-banner.js src/main.js src/pages/legal-page.js src/services/analytics-service.js

      - name: Upload prepared files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: formatted-ga4-files
          path: |
            package.json
            package-lock.json
            cookies/index.html
            privacy/index.html
            src/components/cookie-banner/cookie-banner.js
            src/main.js
            src/pages/legal-page.js
            src/services/analytics-service.js
          retention-days: 1

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Build production site
        run: npm run build
